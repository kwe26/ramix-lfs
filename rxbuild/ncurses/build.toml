[build]
system = "autotools"

out_of_source = true

configure = [
    "--prefix=/usr",
    "--mandir=/usr/share/man",
    "--with-shared",
    "--without-debug",
    "--without-normal",
    "--with-cxx-shared",
    "--enable-pc-files",
    "--enable-widec"
]

make = [
    "-j${NPROC}"
]

install = [
    "DESTDIR=${DESTDIR}"
]